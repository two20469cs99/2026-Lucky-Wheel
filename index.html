        // --- Audio Utils ---
        class SoundManager {
          constructor() {
            this.ctx = null;
            this.masterGain = null;
          }
          
          init() {
            if (!this.ctx) {
              this.ctx = new (window.AudioContext || window.webkitAudioContext)();
              this.masterGain = this.ctx.createGain();
              this.masterGain.connect(this.ctx.destination);
            }
          }

          async resumeContext() {
            this.init();
            if (this.ctx && this.ctx.state === 'suspended') {
              await this.ctx.resume();
            }
          }

          playTick(volume) {
            this.init();
            if (!this.ctx || !this.masterGain) return;

            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();

            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(600, t); 
            osc.frequency.exponentialRampToValueAtTime(200, t + 0.05);

            gain.gain.setValueAtTime(volume * 0.5, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);

            osc.connect(gain);
            gain.connect(this.masterGain);

            osc.start(t);
            osc.stop(t + 0.06);
          }

          playWin(volume) {
            this.init();
            if (!this.ctx || !this.masterGain) return;

            const now = this.ctx.currentTime;
            const notes = [
              { f: 523.25, d: 0.2, t: 0 },
              { f: 523.25, d: 0.2, t: 0.2 },
              { f: 523.25, d: 0.2, t: 0.4 },
              { f: 659.25, d: 0.6, t: 0.6 },
              { f: 523.25, d: 0.2, t: 1.2 },
              { f: 659.25, d: 1.5, t: 1.4 }
            ]; 
            
            notes.forEach((note) => {
              const osc = this.ctx.createOscillator();
              const gain = this.ctx.createGain();
              
              osc.type = 'sawtooth';
              osc.frequency.value = note.f;
              
              const filter = this.ctx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.setValueAtTime(2000, now);
              filter.frequency.linearRampToValueAtTime(4000, now + note.t + 0.1);

              const startTime = now + note.t;
              const stopTime = startTime + note.d;

              gain.gain.setValueAtTime(0, startTime);
              gain.gain.linearRampToValueAtTime(volume * 0.3, startTime + 0.05);
              gain.gain.exponentialRampToValueAtTime(0.01, stopTime);

              osc.connect(filter);
              filter.connect(gain);
              gain.connect(this.masterGain);

              osc.start(startTime);
              osc.stop(stopTime + 0.1);
            });
          }

        const BackgroundMusic = ({ 
          isPlaying, volume, isMuted, customAudioSrc, mode, seekTime, onEnded, onTimeUpdate

          const audioRef = useRef(null);

          useEffect(() => {
            if (audioRef.current) {
              audioRef.current.volume = Math.max(0, Math.min(1, volume));
            }
          }, [volume]);

          useEffect(() => {
            const audio = audioRef.current;
            if (!audio) return;
            if (isPlaying && !isMuted) {
              audio.play().catch(console.warn);
            } else {
              audio.pause();
            }
          }, [isPlaying, isMuted, customAudioSrc]);

          useEffect(() => {
            if (audioRef.current && seekTime !== null && Number.isFinite(seekTime)) {
               audioRef.current.currentTime = seekTime;
            }
          }, [seekTime]);

          useEffect(() => {
            const audio = audioRef.current;
            if (!audio) return;
            const handleEnded = () => onEnded();
            const handleTimeUpdate = () => onTimeUpdate(audio.currentTime, audio.duration || 0);
            
            audio.addEventListener('ended', handleEnded);
            audio.addEventListener('timeupdate', handleTimeUpdate);
            audio.addEventListener('loadedmetadata', handleTimeUpdate);
            return () => {
                audio.removeEventListener('ended', handleEnded);
                audio.removeEventListener('timeupdate', handleTimeUpdate);
                audio.removeEventListener('loadedmetadata', handleTimeUpdate);
            };
          }, [onEnded, onTimeUpdate]);

          if (!customAudioSrc) return null;

          return (
            <audio 
              ref={audioRef}
              src={customAudioSrc}
              loop={mode === 'repeat'}
              playsInline
              preload="auto"
              style={{ display: 'none' }}

        const RouletteWheel = ({ names, rotation, isSpinning, onSpin, disabled }) => {
          const canvasRef = useRef(null);
          const size = 1200;

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            
            ctx.clearRect(0, 0, size, size);
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 25;
            const totalSegments = names.length;
            const arcSize = (2 * Math.PI) / totalSegments;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 15, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fill();

            names.forEach((name, index) => {
              const angle = index * arcSize;
              const color = SEGMENT_COLORS[index % SEGMENT_COLORS.length];
              ctx.save();
              ctx.beginPath();
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
              ctx.closePath();
              ctx.fillStyle = color.bg;
              ctx.fill();
              ctx.lineWidth = 4;
              ctx.strokeStyle = 'rgba(255,255,255,0.8)';
              ctx.stroke();

              ctx.translate(centerX, centerY);
              ctx.rotate(angle + arcSize / 2);
              ctx.textAlign = 'right';
              ctx.fillStyle = color.text;
              ctx.textBaseline = 'middle';
              
              let fontSize = 40;
              if (totalSegments <= 8) fontSize = 60;
              else if (totalSegments <= 16) fontSize = 48;
              else if (totalSegments <= 24) fontSize = 36;
              else fontSize = 28;

              ctx.font = `900 ${fontSize}px "Noto Sans TC", sans-serif`;
              const textRadius = radius - 50; 
              const maxTextWidth = textRadius - 100;
              let displayText = name;
              if (ctx.measureText(displayText).width > maxTextWidth) {
                 while (ctx.measureText(displayText + '...').width > maxTextWidth && displayText.length > 0) {
                    displayText = displayText.slice(0, -1);
                 }
                 displayText += '...';
              }
              ctx.shadowColor = "rgba(0,0,0,0.5)";
              ctx.shadowBlur = 4;
              ctx.fillText(displayText, textRadius, 0);
              ctx.restore();
            });
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#FBBF24';
            ctx.stroke();
          }, [names]);

          return (
            <div className="relative" style={{ width: '85vh', height: '85vh' }}>

              </div>

              <button onClick={onSpin} disabled={disabled} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[18%] h-[18%] bg-white rounded-full border-[6px] border-yellow-400 shadow-2xl flex items-center justify-center z-20 hover:scale-105 active:scale-95 transition-transform disabled:opacity-80 disabled:cursor-not-allowed group cursor-pointer">
                <div className="w-[85%] h-[85%] bg-gradient-to-br from-red-500 to-red-700 rounded-full flex items-center justify-center text-white font-black text-3xl md:text-5xl shadow-inner group-hover:from-red-600 group-hover:to-red-800 transition-all border-4 border-white/20">GO</div>
              </button>
              <div className="absolute inset-0 rounded-full bg-gradient-to-tr from-white/30 via-transparent to-transparent pointer-events-none z-10"></div>
            </div>
          );
        };

        const Controls = ({
          names, rawInput, setRawInput, spinDuration, setSpinDuration, isRandomDuration, setIsRandomDuration,
          minDuration, setMinDuration, maxDuration, setMaxDuration, onShuffle, onClearNames, isSpinning,
          history, onClearHistory, autoRemoveWinner, setAutoRemoveWinner, isAutoMode, setIsAutoMode,
          sfxVolume, setSfxVolume, musicVolume, setMusicVolume, isMuted, setIsMuted, isMusicPlaying, setIsMusicPlaying,
          musicCurrentTime, musicDuration, onSeekMusic, playlist, currentTrackId, playbackMode, setPlaybackMode,
          onPlaylistUpload, onTrackSelect, onTrackDelete, currentTheme, setTheme,
          prizes, setPrizes, currentPrizeId, setCurrentPrizeId
        }) => {
          const fileInputRef = useRef(null);
          const nameListInputRef = useRef(null);
          const prizeListInputRef = useRef(null);
          const [draggedPrizeIndex, setDraggedPrizeIndex] = useState(null);
          const [expandedHistoryId, setExpandedHistoryId] = useState(null);
          const [isDraggingProgress, setIsDraggingProgress] = useState(false);
          const [dragProgressValue, setDragProgressValue] = useState(0);
          const [newPrizeName, setNewPrizeName] = useState('');
          const [newPrizeCount, setNewPrizeCount] = useState(1);
          const [activeTab, setActiveTab] = useState('list'); // 'list', 'settings', 'audio', 'history'

          useEffect(() => {
            if (!isDraggingProgress) setDragProgressValue(musicCurrentTime);
          }, [musicCurrentTime, isDraggingProgress]);

          const activeThemeObj = THEMES.find(t => t.id === currentTheme) || THEMES[0];
          const isDark = activeThemeObj.type === 'dark';
          const ringOffsetClass = isDark ? 'ring-offset-slate-900' : 'ring-offset-white';

          const themeStyle = useMemo(() => {
            if (currentTheme === 'royal') return { active: 'ring-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.6)] bg-gradient-to-r from-amber-600 via-red-600 to-rose-700', text: 'text-amber-50', icon: 'text-amber-100', inactiveIcon: 'text-amber-900 dark:text-amber-100 group-hover:text-amber-700', inactiveBg: 'bg-amber-200/50 dark:bg-amber-900/60 border-amber-300 dark:border-amber-700/50', inputRing: 'focus:border-amber-500 focus:ring-amber-500/50' };
            if (currentTheme === 'cyberpunk') return { active: 'ring-fuchsia-500 shadow-[0_0_15px_rgba(217,70,239,0.6)] bg-gradient-to-r from-violet-600 via-fuchsia-600 to-pink-600', text: 'text-white', icon: 'text-white', inactiveIcon: 'text-fuchsia-900 dark:text-fuchsia-100 group-hover:text-fuchsia-600', inactiveBg: 'bg-fuchsia-200/50 dark:bg-fuchsia-900/60 border-fuchsia-300 dark:border-fuchsia-700/50', inputRing: 'focus:border-fuchsia-500 focus:ring-fuchsia-500/50' };
            return { active: 'ring-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.6)] bg-gradient-to-r from-blue-500 via-cyan-500 to-teal-500', text: 'text-white', icon: 'text-white', inactiveIcon: 'text-slate-700 dark:text-slate-200 group-hover:text-slate-900', inactiveBg: 'bg-slate-300/70 dark:bg-slate-700/80 border-slate-400 dark:border-slate-500', inputRing: 'focus:border-cyan-500 focus:ring-cyan-500/50' };
          }, [currentTheme]);

          const formatTime = (time) => {
            if (isNaN(time)) return "00:00";
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
          };

          const downloadFile = (content, filename, type) => {
            // Add BOM for UTF-8 to ensure Excel displays Chinese characters correctly
            const blob = new Blob(['\uFEFF', content], { type: type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          };

          const handleImportNames = (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              const text = event.target?.result;
              if (text) setRawInput(text);
            };
            reader.readAsText(file);
            e.target.value = '';
          };

          const handleExportPrizes = () => {
            if (prizes.length === 0) return;
            const header = "獎項名稱,數量";
            const csvContent = [header, ...prizes.map(p => `${p.name},${p.initialCount || p.count}`)].join('\n');
            downloadFile(csvContent, 'lucky_wheel_prizes.csv', 'text/csv;charset=utf-8');
          };

          const handleClearPrizes = () => {
            setPrizes([]);
          };

          const handleImportPrizes = (e) => {
            const file = e.target.files?.[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target?.result;
                if (typeof text === 'string') {
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '' && !line.startsWith('獎項名稱'));
                    const newPrizes = lines.map((line, index) => {
                        const parts = line.split(',');
                        const name = parts[0]?.trim() || `獎項 ${index + 1}`;
                        const count = parseInt(parts[1]?.trim()) || 1;
                        return {
                            id: Date.now().toString() + index,
                            name,
                            count,
                            initialCount: count
                        };
                    });
                    if (newPrizes.length > 0) {
                        setPrizes(newPrizes);
                        setCurrentPrizeId(newPrizes[0].id);
                    }
                }
            };
            reader.readAsText(file);
            if (prizeListInputRef.current) prizeListInputRef.current.value = '';
          };
          
          const handleDownloadPrizeTemplate = () => {
            const template = "獎項名稱,數量\n頭獎,1\n二獎,3\n三獎,5";
            downloadFile(template, 'prize_template.csv', 'text/csv;charset=utf-8');
          };

          const handlePrizeDragStart = (e, index) => {
            setDraggedPrizeIndex(index);
            e.dataTransfer.effectAllowed = 'move';
          };

          const handlePrizeDragOver = (e, index) => {
            e.preventDefault();
            if (draggedPrizeIndex === null || draggedPrizeIndex === index) return;
            
            const newPrizes = [...prizes];
            const draggedItem = newPrizes[draggedPrizeIndex];
            newPrizes.splice(draggedPrizeIndex, 1);
            newPrizes.splice(index, 0, draggedItem);
            
            setPrizes(newPrizes);
            setDraggedPrizeIndex(index);
          };

          const handlePrizeDragEnd = () => {
            setDraggedPrizeIndex(null);
          };

          const handleAddPrize = () => {
            if (newPrizeName.trim() && newPrizeCount > 0) {
              const newPrize = { id: Date.now().toString(), name: newPrizeName.trim(), count: newPrizeCount, initialCount: newPrizeCount };
              setPrizes([...prizes, newPrize]);
              if (!currentPrizeId) setCurrentPrizeId(newPrize.id);
              setNewPrizeName('');
              setNewPrizeCount(1);
            }
          };

          const handleDeletePrize = (id) => {
            const updatedPrizes = prizes.filter(p => p.id !== id);
            setPrizes(updatedPrizes);
            if (currentPrizeId === id) {
              setCurrentPrizeId(updatedPrizes.length > 0 ? updatedPrizes[0].id : null);
            }
          };

          const handleRestorePrize = (id) => {
            setPrizes(prizes.map(p => {
              if (p.id === id) {
                return { ...p, count: p.initialCount || 1 };
              }
              return p;
            }));
          };

          return (
            <div className="h-full flex flex-col overflow-hidden">
              {/* Tabs Header */}
              <div className="flex bg-black/10 dark:bg-white/5 rounded-xl p-1 mb-4 flex-shrink-0">
                <button onClick={() => setActiveTab('list')} className={`flex-1 flex flex-col items-center justify-center py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'list' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-500' : 'opacity-60 hover:opacity-100'}`}>
                  <Users size={18} className="mb-1" />名單
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex-1 flex flex-col items-center justify-center py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'settings' ? 'bg-white dark:bg-slate-700 shadow-sm text-cyan-500' : 'opacity-60 hover:opacity-100'}`}>
                  <Settings2 size={18} className="mb-1" />設定
                </button>
                <button onClick={() => setActiveTab('audio')} className={`flex-1 flex flex-col items-center justify-center py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'audio' ? 'bg-white dark:bg-slate-700 shadow-sm text-green-500' : 'opacity-60 hover:opacity-100'}`}>
                  <Music size={18} className="mb-1" />音效
                </button>
                <button onClick={() => setActiveTab('history')} className={`flex-1 flex flex-col items-center justify-center py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'history' ? 'bg-white dark:bg-slate-700 shadow-sm text-purple-500' : 'opacity-60 hover:opacity-100'}`}>
                  <History size={18} className="mb-1" />紀錄
                </button>
              </div>

              <div className="flex-1 overflow-y-auto scrollbar-thin scrollbar-thumb-current pr-1 pb-20 flex flex-col gap-4">
                
                {/* Tab: List & Prizes */}
                <div className={activeTab === 'list' ? 'flex flex-col gap-4 animate-in fade-in slide-in-from-right-4 duration-300' : 'hidden'}>
                  <div className="flex-col gap-2 flex">
                    <div className="flex items-center justify-between">
                        <label className="flex items-center gap-2 font-bold text-sm opacity-90"><Users size={16} className="text-blue-500" />名單設定<span className="text-xs opacity-50 font-normal ml-auto">共 {names.length} 人</span></label>
                        <div className="flex items-center gap-1">
                            <input type="file" ref={nameListInputRef} onChange={handleImportNames} accept=".txt,.csv" className="hidden" />
                            <button onClick={() => nameListInputRef.current?.click()} disabled={isSpinning} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors disabled:opacity-30 text-current opacity-70" title="匯入名單"><FileUp size={14} /></button>
                            <button onClick={() => downloadFile(names.join('\n'), 'lucky_wheel_names.txt', 'text/plain;charset=utf-8')} disabled={names.length === 0} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors disabled:opacity-30 text-current opacity-70" title="匯出名單"><Download size={14} /></button>
                        </div>
                    </div>
                    <textarea className="w-full min-h-[120px] bg-black/5 dark:bg-black/40 border border-current/10 rounded-lg p-3 text-sm focus:ring-2 focus:ring-yellow-500 outline-none resize-none transition-all placeholder-current/30" placeholder="輸入名字，每行一個..." value={rawInput} onChange={(e) => setRawInput(e.target.value)} disabled={isSpinning} />
                    <div className="flex gap-2">
                       <button onClick={onClearNames} disabled={isSpinning || names.length === 0} className="flex-1 flex items-center justify-center gap-2 bg-red-100 text-red-600 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 py-2 px-3 rounded-lg text-xs font-medium transition-all disabled:opacity-50"><Trash2 size={14} />清空</button>
                       <button onClick={onShuffle} disabled={isSpinning || names.length < 2} className="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white hover:bg-blue-500 py-2 px-3 rounded-lg text-xs font-medium transition-all disabled:opacity-50 shadow-md"><Shuffle size={14} />打亂</button>
                    </div>
                  </div>
                  
                  <hr className="border-current/10" />

                  <div className="flex flex-col gap-2">
                    <button onClick={() => setIsAutoMode(!isAutoMode)} disabled={names.length < 2 || (currentPrizeId && prizes.find(p => p.id === currentPrizeId)?.count <= 0)} className={`group flex items-center justify-center gap-3 w-full py-3 rounded-xl font-bold text-base transition-all border-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed ${isAutoMode ? 'bg-gradient-to-r from-emerald-500 to-teal-600 border-emerald-400 text-white animate-pulse' : 'bg-white/5 border-current/10 hover:bg-current/10 hover:border-current/20'}`}>
                      {isAutoMode ? <><PauseCircle size={24} className="animate-spin-slow" /><span>暫停自動抽獎</span></> : <><PlayCircle size={24} className="text-emerald-500 group-hover:scale-110 transition-transform" /><span>啟動自動抽獎</span></>}
                    </button>
                  </div>
                  
                  <hr className="border-current/10" />
                  
                  {/* 獎項設定區域 */}
                  <div className="flex flex-col gap-2">
                    <div className="flex items-center justify-between">
                      <label className="flex items-center gap-2 font-bold text-sm opacity-90"><Gift size={16} className="text-yellow-500" />獎項設定</label>
                      <div className="flex items-center gap-1">
                          <button onClick={handleDownloadPrizeTemplate} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-blue-500" title="下載範例"><FileText size={16} /></button>
                          <input type="file" ref={prizeListInputRef} onChange={handleImportPrizes} accept=".txt,.csv" className="hidden" />
                          <button onClick={() => prizeListInputRef.current?.click()} disabled={isSpinning} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors disabled:opacity-30 text-green-500" title="匯入獎項"><FileUp size={16} /></button>
                          <button onClick={handleExportPrizes} disabled={prizes.length === 0} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors disabled:opacity-30 text-amber-500" title="匯出獎項"><Download size={16} /></button>
                          <button onClick={handleClearPrizes} disabled={prizes.length === 0} className="p-1.5 rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-colors disabled:opacity-30 text-red-500" title="全部清空"><Trash2 size={16} /></button>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        placeholder="獎項名稱" 
                        value={newPrizeName}
                        onChange={(e) => setNewPrizeName(e.target.value)}
                        className="flex-1 bg-black/5 dark:bg-black/40 border border-current/10 rounded-lg p-2 text-sm focus:ring-2 focus:ring-yellow-500 outline-none transition-all"
                        disabled={isSpinning}
                      />
                      <input 
                        type="number" 
                        min="1" 
                        value={newPrizeCount}
                        onChange={(e) => setNewPrizeCount(parseInt(e.target.value) || 1)}
                        className="w-16 bg-black/5 dark:bg-black/40 border border-current/10 rounded-lg p-2 text-sm focus:ring-2 focus:ring-yellow-500 outline-none transition-all text-center"
                        disabled={isSpinning}
                      />
                      <button 
                        onClick={handleAddPrize}
                        disabled={isSpinning || !newPrizeName.trim()}
                        className="bg-yellow-500 text-white hover:bg-yellow-600 p-2 rounded-lg transition-colors disabled:opacity-50"
                      >
                        <Plus size={18} />
                      </button>
                    </div>
                    
                    {prizes.length > 0 && (
                      <div className="mt-2 flex flex-col gap-2 max-h-[150px] overflow-y-auto scrollbar-thin scrollbar-thumb-current/20 pr-1">
                        {prizes.map((prize, index) => (
                          <div 
                            key={prize.id} 
                            draggable={!isSpinning}
                            onDragStart={(e) => handlePrizeDragStart(e, index)}
                            onDragOver={(e) => handlePrizeDragOver(e, index)}
                            onDragEnd={handlePrizeDragEnd}
                            className={`flex items-center justify-between p-2 rounded-lg border transition-all cursor-pointer ${currentPrizeId === prize.id ? 'border-yellow-500 bg-yellow-500/10' : 'border-current/10 hover:bg-current/5'} ${prize.count <= 0 ? 'opacity-50 grayscale' : ''} ${draggedPrizeIndex === index ? 'opacity-50 border-dashed' : ''}`}
                            onClick={() => {
                               if (prize.count > 0) setCurrentPrizeId(prize.id);
                            }}
                          >
                            <div className="flex items-center gap-2 min-w-0">
                              <div className="cursor-grab active:cursor-grabbing text-current/30 hover:text-current/60 p-1 -ml-1" title="拖曳排序">
                                <GripVertical size={14} />
                              </div>
                              <div className={`w-3 h-3 rounded-full flex-shrink-0 ${currentPrizeId === prize.id ? 'bg-yellow-500' : 'bg-current/20'}`}></div>
                              <span className="font-medium truncate text-sm">{prize.name}</span>
                            </div>
                            <div className="flex items-center gap-3 flex-shrink-0">
                              <span className={`text-xs font-bold px-2 py-1 rounded-full ${prize.count > 0 ? 'bg-green-500/20 text-green-600 dark:text-green-400' : 'bg-red-500/20 text-red-600 dark:text-red-400'}`}>
                                剩餘: {prize.count}
                              </span>
                              <button 
                                onClick={(e) => { e.stopPropagation(); handleRestorePrize(prize.id); }}
                                disabled={isSpinning || prize.count === (prize.initialCount || 1)}
                                className="text-current/50 hover:text-blue-500 transition-colors disabled:opacity-30"
                                title="恢復數量"
                              >
                                <RotateCcw size={14} />
                              </button>
                              <button 
                                onClick={(e) => { e.stopPropagation(); handleDeletePrize(prize.id); }}
                                disabled={isSpinning}
                                className="text-current/50 hover:text-red-500 transition-colors disabled:opacity-50"
                                title="刪除"
                              >
                                <Trash2 size={14} />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {/* Tab: Settings */}
                <div className={activeTab === 'settings' ? 'flex flex-col gap-4 animate-in fade-in slide-in-from-right-4 duration-300' : 'hidden'}>
                  <div className="flex flex-col gap-2">
                    <label className="flex items-center gap-2 font-medium text-sm opacity-90"><Palette size={16} className="text-pink-500" /><span>風格主題</span></label>
                    <div className="grid grid-cols-6 gap-2">
                      {THEMES.map((theme) => (
                        <button key={theme.id} onClick={() => setTheme(theme.id)} className={`group relative w-full aspect-square rounded-full border-2 transition-all ${currentTheme === theme.id ? 'border-yellow-500 scale-110' : 'border-transparent hover:scale-105'}`} title={theme.name}>
                          <div className={`w-full h-full rounded-full ${theme.buttonColor} shadow-sm border border-black/10`}></div>
                        </button>
                      ))}
                    </div>
                  </div>
                  
                  <hr className="border-current/10" />
                  
                  <div className="flex flex-col gap-2">
                    <label className="flex items-center gap-2 font-medium text-sm opacity-90"><Settings2 size={16} className="text-cyan-500" /><span>轉動時間 (秒)</span></label>
                    <div className="flex flex-wrap gap-2">
                      {[5, 8].map((time) => (<button key={time} onClick={() => { setIsRandomDuration(false); setSpinDuration(time); }} disabled={isSpinning} className={`flex-1 py-2 px-2 rounded-md text-xs font-bold transition-all min-w-[40px] shadow-sm ${!isRandomDuration && spinDuration === time ? 'bg-yellow-500 text-white shadow-md scale-105' : 'bg-white/10 hover:bg-white/20 border border-current/10'}`}>{time}s</button>))}
                      <button onClick={() => setIsRandomDuration(true)} disabled={isSpinning} className={`group flex-1 py-2 px-2 rounded-md text-xs font-bold transition-all min-w-[40px] flex items-center justify-center gap-1.5 overflow-hidden relative isolate ${isRandomDuration ? `ring-2 ${ringOffsetClass} ring-offset-2 scale-105 z-10 ${themeStyle.active}` : `hover:scale-105 border ${themeStyle.inactiveBg}`}`}>
                          <Dices size={16} className={`relative z-10 ${isRandomDuration ? themeStyle.icon : themeStyle.inactiveIcon}`} /><span className={`relative z-10 ${isRandomDuration ? themeStyle.text : themeStyle.inactiveIcon}`}>隨機</span>
                      </button>
                      {isRandomDuration ? (
                         <div className="flex items-center gap-2 w-full mt-1 animate-in fade-in slide-in-from-top-2 duration-300">
                             <div className="relative flex-1"><input type="number" min="1" max="300" value={minDuration} onChange={(e) => { const v=parseInt(e.target.value); setMinDuration(v); if(v>maxDuration) setMaxDuration(v); }} disabled={isSpinning} className={`w-full py-2 px-3 rounded-md text-sm font-bold bg-white text-slate-900 border-2 border-slate-300 focus:ring-2 outline-none text-center shadow-inner ${themeStyle.inputRing}`} /><span className="absolute right-1 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 font-bold pointer-events-none">MIN</span></div>
                             <span className="text-xs opacity-50">~</span>
                             <div className="relative flex-1"><input type="number" min="1" max="300" value={maxDuration} onChange={(e) => { const v=parseInt(e.target.value); setMaxDuration(v); if(v<minDuration) setMinDuration(v); }} disabled={isSpinning} className={`w-full py-2 px-3 rounded-md text-sm font-bold bg-white text-slate-900 border-2 border-slate-300 focus:ring-2 outline-none text-center shadow-inner ${themeStyle.inputRing}`} /><span className="absolute right-1 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 font-bold pointer-events-none">MAX</span></div>
                         </div>
                      ) : (
                        <div className="relative flex-1 min-w-[70px]"><input type="number" min="1" max="300" value={spinDuration} onChange={(e) => { const val = parseInt(e.target.value); if (!isNaN(val) && val > 0) setSpinDuration(val); }} disabled={isSpinning} className="w-full h-full py-2 px-3 rounded-md text-sm font-bold bg-white text-slate-900 border-2 border-slate-300 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/50 outline-none text-center shadow-inner transition-all placeholder:text-slate-400" placeholder="自訂" /><span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-slate-500 font-bold pointer-events-none">秒</span></div>
                      )}
                    </div>
                  </div>
                  
                  <hr className="border-current/10" />
                  
                  <button onClick={() => setAutoRemoveWinner(!autoRemoveWinner)} className="flex items-center gap-2 opacity-80 hover:opacity-100 transition-colors text-sm font-medium p-3 rounded-lg bg-current/5 border border-current/10">
                    {autoRemoveWinner ? <CheckSquare className="text-green-500" size={18} /> : <Square className="opacity-50" size={18} />}中獎後自動從名單移除
                  </button>
                </div>

                {/* Tab: Audio */}
                <div className={activeTab === 'audio' ? 'flex flex-col gap-4 animate-in fade-in slide-in-from-right-4 duration-300' : 'hidden'}>
                  <div className="flex items-center justify-between font-medium text-sm opacity-90">
                      <label className="flex items-center gap-2">{isMuted ? <VolumeX size={16} className="text-gray-400" /> : <Volume2 size={16} className="text-green-500" />}<span>音效與音樂</span></label>
                      <button onClick={() => setIsMuted(!isMuted)} className={`text-[10px] px-2 py-0.5 rounded border border-current/20 opacity-70 hover:opacity-100 transition-colors ${isMuted ? 'bg-red-500/10 text-red-500' : 'bg-green-500/10 text-green-500'}`}>{isMuted ? '已靜音' : '開啟中'}</button>
                  </div>
                  <div className={`flex flex-col gap-4 transition-opacity ${isMuted ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                        <div className="bg-current/5 rounded-lg px-3 py-3 border border-current/5 flex items-center gap-3">
                            <div className="flex items-center gap-2 min-w-[4rem]"><Speaker size={16} className="opacity-60"/><span className="text-sm font-bold opacity-70">音效</span></div>
                            <div className="flex-1 flex items-center"><input type="range" min="0" max="1" step="0.05" value={sfxVolume} onChange={(e) => setSfxVolume(parseFloat(e.target.value))} className="w-full h-1.5 bg-current/10 rounded-lg appearance-none cursor-pointer accent-blue-500 hover:h-2 transition-all" /></div>
                        </div>
                        <div className="bg-current/5 rounded-lg border border-current/5 overflow-hidden">
                             <div className="p-3 bg-current/5 flex items-center justify-between border-b border-current/5">
                                <div className="flex items-center gap-2"><span className="text-sm font-bold opacity-70 flex items-center gap-1"><Music size={14}/> 背景音樂</span>{playlist.length > 0 && (<span className="text-[10px] bg-current/20 px-2 py-0.5 rounded-full">{playlist.length}</span>)}</div>
                                <input type="file" ref={fileInputRef} onChange={onPlaylistUpload} accept="audio/*" multiple className="hidden" />
                                <button onClick={() => fileInputRef.current?.click()} className="text-xs flex items-center gap-1 hover:text-blue-500 transition-colors opacity-70 hover:opacity-100 bg-current/10 px-2 py-1 rounded-md"><Plus size={12} />新增</button>
                             </div>
                             <div className="max-h-[150px] overflow-y-auto scrollbar-thin scrollbar-thumb-current/20 p-2">
                                {playlist.length === 0 ? (<div className="text-center py-6 opacity-40 text-sm flex flex-col items-center gap-2"><ListMusic size={24} /><span>尚未新增音樂</span></div>) : (
                                     <div className="flex flex-col gap-1">
                                        {playlist.map((track) => {
                                            const isActive = currentTrackId === track.id;
                                            return (
                                                <div key={track.id} className={`group flex items-center justify-between p-2.5 rounded-md text-sm cursor-pointer transition-colors ${isActive ? 'bg-blue-500/10 text-blue-500 font-medium' : 'hover:bg-current/5 opacity-70 hover:opacity-100'}`} onClick={() => onTrackSelect(track.id)}>
                                                    <div className="flex items-center gap-2 min-w-0">{isActive ? <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse" /> : <Music size={12} className="opacity-50" />}<span className="truncate">{track.name}</span></div>
                                                    <button onClick={(e) => { e.stopPropagation(); onTrackDelete(track.id); }} className="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/10 hover:text-red-500 rounded transition-all"><Trash2 size={14} /></button>
                                                </div>
                                            )
                                        })}
                                     </div>
                                )}
                             </div>
                             <div className="px-4 pt-3 bg-current/5">
                                <input type="range" min="0" max={musicDuration || 100} value={dragProgressValue} onChange={(e) => setDragProgressValue(parseFloat(e.target.value))} onMouseDown={() => setIsDraggingProgress(true)} onMouseUp={(e) => { setIsDraggingProgress(false); onSeekMusic(parseFloat(e.target.value)); }} disabled={!currentTrackId} className="w-full h-1.5 bg-current/10 rounded-lg appearance-none cursor-pointer accent-blue-500 hover:h-2 transition-all" />
                                <div className="flex justify-between mt-1.5 text-[10px] font-mono opacity-50"><span>{formatTime(dragProgressValue)}</span><span>{formatTime(musicDuration)}</span></div>
                             </div>
                             <div className="p-4 bg-current/5">
                                <div className="flex items-center gap-4">
                                     <button onClick={() => setIsMusicPlaying(!isMusicPlaying)} disabled={!currentTrackId} className={`w-10 h-10 rounded-full flex items-center justify-center shadow-sm transition-all ${isMusicPlaying ? 'bg-blue-500 text-white hover:bg-blue-400' : 'bg-white text-slate-900 hover:bg-gray-100'} disabled:opacity-50 disabled:cursor-not-allowed`}>{isMusicPlaying ? <Pause size={16} fill="currentColor" /> : <Play size={16} fill="currentColor" className="ml-0.5" />}</button>
                                     <button onClick={() => setPlaybackMode(playbackMode === 'sequential' ? 'shuffle' : playbackMode === 'shuffle' ? 'repeat' : 'sequential')} className="w-10 h-10 rounded-full flex items-center justify-center bg-current/5 hover:bg-current/10 transition-colors">{playbackMode === 'shuffle' ? <Shuffle size={14}/> : playbackMode === 'repeat' ? <Repeat1 size={14}/> : <Repeat size={14}/>}</button>
                                     <div className="flex-1 flex items-center justify-end gap-2 group"><div className="opacity-50 group-hover:opacity-100 transition-opacity">{musicVolume === 0 ? <VolumeX size={16}/> : <Volume1 size={16}/>}</div><input type="range" min="0" max="1" step="0.05" value={musicVolume} onChange={(e) => setMusicVolume(parseFloat(e.target.value))} className="w-20 h-1.5 bg-current/10 rounded-lg appearance-none cursor-pointer accent-orange-500"/></div>
                                </div>
                             </div>
                        </div>
                  </div>
                </div>

                {/* Tab: History */}
                <div className={activeTab === 'history' ? 'flex flex-col gap-2 min-h-[100px] animate-in fade-in slide-in-from-right-4 duration-300' : 'hidden'}>
                  <div className="flex items-center justify-between"><label className="flex items-center gap-2 font-medium text-sm opacity-90"><History size={16} className="text-purple-500" /><span>歷史紀錄</span></label><div className="flex items-center gap-2"><button onClick={() => downloadFile('\uFEFF序號,中獎者,時間\n' + history.map((item, index) => `${index + 1},${item.name},${item.timestamp}`).join('\n'), 'winner_history.csv', 'text/csv;charset=utf-8')} disabled={history.length === 0} className="text-xs text-blue-500 hover:text-blue-400 hover:underline flex items-center gap-1 opacity-80 hover:opacity-100 disabled:opacity-30 disabled:cursor-not-allowed disabled:no-underline"><Download size={12} />匯出</button>{history.length > 0 && (<button onClick={onClearHistory} className="text-xs text-red-500 hover:text-red-400 hover:underline flex items-center gap-1 opacity-80 hover:opacity-100"><Trash2 size={12} />清空</button>)}</div></div>
                  <div className="bg-black/5 dark:bg-black/30 rounded-lg p-2 border border-current/5">
                    {history.length === 0 ? (<div className="py-8 flex items-center justify-center opacity-30 text-sm">尚無任何中獎紀錄</div>) : (
                      <ul className="flex flex-col gap-1 relative">
                        {[...history].reverse().map((item, idx) => {
                          const isExpanded = expandedHistoryId === item.id;
                          const displayIndex = history.length - idx;
                          return (
                            <li key={item.id} className={`relative text-sm rounded transition-all border-b border-current/5 last:border-0 ${isExpanded ? 'z-20' : 'z-0 hover:bg-current/5'}`}>
                              {isExpanded && (<><div className="fixed inset-0 z-10 cursor-default" onClick={(e) => { e.stopPropagation(); setExpandedHistoryId(null); }}></div><div className="absolute bottom-[calc(100%+8px)] left-0 w-full bg-slate-800 text-white p-3 rounded-lg shadow-xl z-20 animate-in slide-in-from-bottom-2 fade-in duration-200 border border-white/10 cursor-auto ring-1 ring-black/20" onClick={(e) => e.stopPropagation()}><div className="flex items-center justify-between mb-2 text-[10px] opacity-50 border-b border-white/10 pb-1"><span className="font-mono">#{displayIndex}</span><span>{item.timestamp}</span></div><div className="text-base font-bold break-words whitespace-normal leading-relaxed select-text">{item.name} {item.prize && <span className="text-yellow-400 ml-2">({item.prize})</span>}</div><div className="absolute -bottom-1.5 left-4 w-3 h-3 bg-slate-800 transform rotate-45 border-r border-b border-white/10"></div></div></>)}
                              <div onClick={() => setExpandedHistoryId(isExpanded ? null : item.id)} className={`flex items-center gap-2 p-2.5 cursor-pointer transition-colors ${isExpanded ? 'bg-current/10' : ''}`}><span className="opacity-40 font-mono w-6 text-right flex-shrink-0">#{displayIndex}</span><div className="flex-1 min-w-0 font-bold truncate">{item.name} {item.prize && <span className="text-yellow-500/80 font-normal ml-1 text-xs">({item.prize})</span>}</div><div className="flex-shrink-0 opacity-50 text-xs font-mono">{item.timestamp}</div><div className={`flex-shrink-0 transition-transform duration-300 ${isExpanded ? 'rotate-180 opacity-100' : 'opacity-30'}`}>{isExpanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}</div></div>
                            </li>
                          );
                        })}
                      </ul>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const App = () => {
          const [names, setNames] = useState(DEFAULT_NAMES);
          const [rawInput, setRawInput] = useState(DEFAULT_NAMES.join('\n'));
          const [rotation, setRotation] = useState(0);
          const [isSpinning, setIsSpinning] = useState(false);
          const [winner, setWinner] = useState(null);
          
          const [spinDuration, setSpinDuration] = useState(5);
          const [isRandomDuration, setIsRandomDuration] = useState(false);
          const [minDuration, setMinDuration] = useState(5);
          const [maxDuration, setMaxDuration] = useState(15);
          
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [showSidebar, setShowSidebar] = useState(true); 
          const [history, setHistory] = useState([]);
          const [autoRemoveWinner, setAutoRemoveWinner] = useState(false);
          const [currentThemeId, setCurrentThemeId] = useState('default');
          const [isAutoMode, setIsAutoMode] = useState(false);
          
          const [sfxVolume, setSfxVolume] = useState(0.15); 
          const [musicVolume, setMusicVolume] = useState(0.15);
          const [isMuted, setIsMuted] = useState(false);
          const [isMusicPlaying, setIsMusicPlaying] = useState(false);
          
          const [musicCurrentTime, setMusicCurrentTime] = useState(0);
          const [musicDuration, setMusicDuration] = useState(0);
          const [musicSeekTime, setMusicSeekTime] = useState(null);

          const [playlist, setPlaylist] = useState([]);
          const [currentTrackId, setCurrentTrackId] = useState(null);
          const [playbackMode, setPlaybackMode] = useState('sequential');

          const [prizes, setPrizes] = useState([]);
          const [currentPrizeId, setCurrentPrizeId] = useState(null);

          const requestRef = useRef(0);
          const startTimeRef = useRef(0);
          const startRotationRef = useRef(0);
          const finalRotationRef = useRef(0);
          const previousAngleRef = useRef(0);
          const currentSpinDurationRef = useRef(5);
          
          const winnerRef = useRef(null);
          const sfxVolumeRef = useRef(sfxVolume);
          const isMutedRef = useRef(isMuted);
          const autoRemoveWinnerRef = useRef(autoRemoveWinner);
          const prizesRef = useRef(prizes);
          const currentPrizeIdRef = useRef(currentPrizeId);

          useEffect(() => { sfxVolumeRef.current = sfxVolume; }, [sfxVolume]);
          useEffect(() => { isMutedRef.current = isMuted; }, [isMuted]);
          useEffect(() => { autoRemoveWinnerRef.current = autoRemoveWinner; }, [autoRemoveWinner]);
          useEffect(() => { prizesRef.current = prizes; }, [prizes]);
          useEffect(() => { currentPrizeIdRef.current = currentPrizeId; }, [currentPrizeId]);

          useEffect(() => {
            let timer;
            if (isAutoMode) {
              if (winner && !isSpinning) {
                timer = window.setTimeout(() => setWinner(null), 5000);
              } else if (!winner && !isSpinning && names.length > 0) {
                const currentPrize = prizesRef.current.find(p => p.id === currentPrizeIdRef.current);
                if (currentPrize && currentPrize.count <= 0) {
                  setIsAutoMode(false);
                } else {
                  timer = window.setTimeout(() => handleSpin(), 1500);
                }
              }
            }
            return () => clearTimeout(timer);
          }, [isAutoMode, winner, isSpinning, names.length]);

          useEffect(() => {
            return () => playlist.forEach(track => URL.revokeObjectURL(track.url));
          }, []);

          const currentTheme = THEMES.find(t => t.id === currentThemeId) || THEMES[0];
          const isDarkTheme = currentTheme.type === 'dark';
          const currentTrack = playlist.find(t => t.id === currentTrackId);
          const customAudioSrc = currentTrack?.url || null;

          const handleInputChange = (val) => {
            setRawInput(val);
            const newNames = val.split('\n').map(n => n.trim()).filter(n => n.length > 0);
            setNames(newNames.length > 0 ? newNames : []);
          };

          const handleClearNames = () => {
            setRawInput('');
            setNames([]);
            setIsAutoMode(false);
          };

          const handleShuffle = () => {
            const shuffled = [...names];
            for (let i = shuffled.length - 1; i > 0; i--) {
              const randomBuffer = new Uint32Array(1);
              window.crypto.getRandomValues(randomBuffer);
              const cryptoRandom = randomBuffer[0] / (0xffffffff + 1);
              const j = Math.floor(cryptoRandom * (i + 1));
              [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            setNames(shuffled);
            setRawInput(shuffled.join('\n'));
            setRotation(0); 
          };

          const handlePlaylistUpload = (e) => {
            const files = e.target.files;
            if (files && files.length > 0) {
              const newTracks = Array.from(files).map((file) => ({
                id: window.crypto.randomUUID(),
                name: file.name.replace(/\.[^/.]+$/, ""),
                url: URL.createObjectURL(file)
              }));
              setPlaylist(prev => [...prev, ...newTracks]);
              if (!currentTrackId && newTracks.length > 0) {
                setCurrentTrackId(newTracks[0].id);
                if (!isMuted) setIsMusicPlaying(true);
              }
            }
            e.target.value = '';
          };

          const handleTrackSelect = (id) => {
            setCurrentTrackId(id);
            if (!isMuted) setIsMusicPlaying(true);
          };

          const handleTrackDelete = (id) => {
            const trackToDelete = playlist.find(t => t.id === id);
            if (trackToDelete) URL.revokeObjectURL(trackToDelete.url);
            const newPlaylist = playlist.filter(t => t.id !== id);
            setPlaylist(newPlaylist);
            if (currentTrackId === id) {
              setCurrentTrackId(null);
              setIsMusicPlaying(false);
              setMusicCurrentTime(0);
              setMusicDuration(0);
            }
            if (newPlaylist.length === 0) {
              setMusicCurrentTime(0);
              setMusicDuration(0);
              setIsMusicPlaying(false);
            }
          };

          const handleTrackEnd = () => {
            if (playlist.length === 0) return;
            const currentIndex = playlist.findIndex(t => t.id === currentTrackId);
            if (playbackMode === 'shuffle') {
                const randomBuffer = new Uint32Array(1);
                window.crypto.getRandomValues(randomBuffer);
                const cryptoRandom = randomBuffer[0] / (0xffffffff + 1);
                let nextIndex = Math.floor(cryptoRandom * playlist.length);
                if (playlist.length > 1 && nextIndex === currentIndex) nextIndex = (nextIndex + 1) % playlist.length;
                setCurrentTrackId(playlist[nextIndex].id);
            } else {
                const nextIndex = (currentIndex + 1) % playlist.length;
                setCurrentTrackId(playlist[nextIndex].id);
            }
          };

          const easeOutQuint = (x) => 1 - Math.pow(1 - x, 5);

          const animate = (time) => {
            if (!startTimeRef.current) startTimeRef.current = time;
            const elapsed = time - startTimeRef.current;
            const durationMs = currentSpinDurationRef.current * 1000;
            const progress = Math.min(elapsed / durationMs, 1);
            const ease = easeOutQuint(progress);
            const totalChange = finalRotationRef.current - startRotationRef.current;
            const currentRotation = startRotationRef.current + (totalChange * ease);
            setRotation(currentRotation);

            if (!isMutedRef.current) {
                const segmentAngle = 360 / Math.max(names.length, 1);
                const effectiveAngle = (270 - currentRotation) % 360;
                const normalizedAngle = effectiveAngle < 0 ? effectiveAngle + 360 : effectiveAngle;
                const currentSegmentIndex = Math.floor(normalizedAngle / segmentAngle);
                
                const prevEffective = (270 - previousAngleRef.current) % 360;
                const prevNormalized = prevEffective < 0 ? prevEffective + 360 : prevEffective;
                const prevSegmentIndex = Math.floor(prevNormalized / segmentAngle);

                if (currentSegmentIndex !== prevSegmentIndex) {
                     let tickVol = sfxVolumeRef.current;
                     if (progress > 0.95) tickVol = sfxVolumeRef.current * 0.3;
                     else if (progress > 0.8) tickVol = sfxVolumeRef.current * 0.6;
                     soundManager.playTick(tickVol);
                }
                previousAngleRef.current = currentRotation;
            }

            if (progress < 1) {
              requestRef.current = requestAnimationFrame(animate);
            } else {
              handleSpinEnd();
            }
          };

          const handleSpin = () => {
            if (isSpinning || names.length === 0) return;
            const currentPrize = prizesRef.current.find(p => p.id === currentPrizeIdRef.current);
            if (currentPrize && currentPrize.count <= 0) {
              setIsAutoMode(false);
              return;
            }
            let actualDuration = spinDuration;
            if (isRandomDuration) {
              const randomBuffer = new Uint32Array(1);
              window.crypto.getRandomValues(randomBuffer);
              const cryptoRandom = randomBuffer[0] / (0xffffffff + 1);
              actualDuration = cryptoRandom * (maxDuration - minDuration) + minDuration;
            }
            currentSpinDurationRef.current = actualDuration;

            setWinner(null);
            setIsSpinning(true);
            winnerRef.current = null; 
            soundManager.resumeContext();
            
            const randomBuffer = new Uint32Array(1);
            window.crypto.getRandomValues(randomBuffer);
            const cryptoRandom = randomBuffer[0] / (0xffffffff + 1);
            const winnerIndex = Math.floor(cryptoRandom * names.length);
            const winnerName = names[winnerIndex];
            winnerRef.current = winnerName;
            setWinner(winnerName); 
            
            const segmentAngle = 360 / names.length;
            const winnerCenterAngle = (winnerIndex * segmentAngle) + (segmentAngle / 2);
            const halfSegment = segmentAngle / 2;
            const safeZone = halfSegment * 0.7; 
            
            const offsetBuffer = new Uint32Array(1);
            window.crypto.getRandomValues(offsetBuffer);
            const cryptoOffsetRandom = offsetBuffer[0] / (0xffffffff + 1);
            const randomOffset = (cryptoOffsetRandom * 2 - 1) * safeZone; 
            const targetBaseRotation = 270 - (winnerCenterAngle + randomOffset);
            const currentRot = rotation;
            const minSpins = 10;
            const extraSpins = Math.floor(actualDuration / 2); 
            let target = currentRot + ((minSpins + extraSpins) * 360);
            let targetMod = targetBaseRotation % 360;
            if (targetMod < 0) targetMod += 360;
            let currentMod = target % 360;
            if (currentMod < 0) currentMod += 360;
            let diff = targetMod - currentMod;
            if (diff <= 0) diff += 360; 
            const finalRot = target + diff;
            
            startRotationRef.current = currentRot;
            finalRotationRef.current = finalRot;
            previousAngleRef.current = currentRot;
            startTimeRef.current = 0;
            
            cancelAnimationFrame(requestRef.current);
            requestRef.current = requestAnimationFrame(animate);
          };

          const handleSpinEnd = () => {
            setIsSpinning(false);
            if (!isMutedRef.current) soundManager.playWin(sfxVolumeRef.current);
            const winningName = winnerRef.current;
            if (winningName) {
              const now = new Date();
              const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
              
              let prizeName = '';
              const currentPrizeId = currentPrizeIdRef.current;
              if (currentPrizeId) {
                const prize = prizesRef.current.find(p => p.id === currentPrizeId);
                if (prize) prizeName = prize.name;
              }

              setHistory(prev => [...prev, { id: Date.now(), name: winningName, timestamp: timeString, prize: prizeName }]);
              
              if (currentPrizeId) {
                setPrizes(prev => prev.map(p => {
                  if (p.id === currentPrizeId && p.count > 0) {
                    return { ...p, count: p.count - 1 };
                  }
                  return p;
                }));
              }

              if (autoRemoveWinnerRef.current) {
                setTimeout(() => {
                  setNames(prevNames => {
                     const newNames = prevNames.filter(n => n !== winningName);
                     setRawInput(newNames.join('\n'));
                     return newNames;
                  });
                }, 500); 
              }
            }
          };

          const toggleFullscreen = () => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().then(() => setIsFullscreen(true));
            } else {
              document.exitFullscreen().then(() => setIsFullscreen(false));
            }
          };

          useEffect(() => {
            const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
            document.addEventListener('fullscreenchange', handleFullscreenChange);
            return () => {
                document.removeEventListener('fullscreenchange', handleFullscreenChange);
                cancelAnimationFrame(requestRef.current);
            }
          }, []);

          return (
            <div className={`h-screen w-screen overflow-hidden flex transition-colors duration-700 ${currentTheme.class} ${isDarkTheme ? 'text-white' : 'text-slate-800'}`}>
              <BackgroundMusic 
                isPlaying={isMusicPlaying} volume={musicVolume} isMuted={isMuted} customAudioSrc={customAudioSrc}
                mode={playbackMode} seekTime={musicSeekTime} onEnded={handleTrackEnd} 
                onTimeUpdate={(c, d) => { setMusicCurrentTime(c); if(d>0) setMusicDuration(d); }}
              />
              <button onClick={toggleFullscreen} className={`absolute top-4 left-4 z-30 p-3 rounded-full shadow-lg transition-colors ${isDarkTheme ? 'bg-white/10 text-white hover:bg-white/20' : 'bg-white text-slate-800 hover:bg-slate-100'}`}>
                {isFullscreen ? <Minimize size={24} /> : <Maximize size={24} />}
              </button>
              {!showSidebar && (
                <button onClick={() => setShowSidebar(true)} className="absolute top-4 right-4 z-30 p-3 bg-slate-800 text-white rounded-full shadow-lg hover:bg-slate-700 transition-colors">
                  <Menu size={24} />
                </button>
              )}
              <main className="flex-1 h-full relative flex items-center justify-center overflow-hidden">
                <div className={`absolute inset-0 pointer-events-none ${isDarkTheme ? 'opacity-30' : 'opacity-10'}`}>
                     <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-purple-600/20 blur-[150px] rounded-full"></div>
                     <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-yellow-600/20 blur-[150px] rounded-full"></div>
                </div>
                <div className="relative z-10 scale-100 transform transition-transform duration-500">
                     <RouletteWheel names={names} rotation={rotation} isSpinning={isSpinning} onSpin={handleSpin} disabled={isSpinning || names.length < 2 || (currentPrizeId && prizes.find(p => p.id === currentPrizeId)?.count <= 0)} />
                </div>
              </main>
              <aside className={`flex-shrink-0 h-full transition-all duration-500 ease-in-out z-20 shadow-2xl ${showSidebar ? 'w-[360px] translate-x-0' : 'w-0 translate-x-full opacity-0'} ${isDarkTheme ? 'bg-slate-900/90 border-l border-white/10' : 'bg-white/90 border-l border-slate-200'} backdrop-blur-md relative`}>
                <div className="h-full w-[360px] flex flex-col p-4 overflow-hidden">
                  <div className="flex items-center justify-between mb-4 pl-2">
                    <h1 className={`text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r ${isDarkTheme ? 'from-yellow-400 to-white' : 'from-red-600 to-yellow-600'}`}>幸運輪盤</h1>
                    <button onClick={() => setShowSidebar(false)} className="p-2 hover:bg-black/10 rounded-full"><X size={20} /></button>
                  </div>
                  <div className="flex-1 overflow-hidden">
                    <Controls 
                      names={names} rawInput={rawInput} setRawInput={handleInputChange} spinDuration={spinDuration} setSpinDuration={setSpinDuration}
                      isRandomDuration={isRandomDuration} setIsRandomDuration={setIsRandomDuration} minDuration={minDuration} setMinDuration={setMinDuration} maxDuration={maxDuration} setMaxDuration={setMaxDuration}
                      onShuffle={handleShuffle} onClearNames={handleClearNames} isSpinning={isSpinning} history={history} onClearHistory={() => setHistory([])}
                      autoRemoveWinner={autoRemoveWinner} setAutoRemoveWinner={setAutoRemoveWinner} isAutoMode={isAutoMode} setIsAutoMode={setIsAutoMode}
                      sfxVolume={sfxVolume} setSfxVolume={setSfxVolume} musicVolume={musicVolume} setMusicVolume={setMusicVolume} isMuted={isMuted} setIsMuted={setIsMuted} isMusicPlaying={isMusicPlaying} setIsMusicPlaying={setIsMusicPlaying}
                      musicCurrentTime={musicCurrentTime} musicDuration={musicDuration} onSeekMusic={setMusicSeekTime} currentTheme={currentThemeId} setTheme={setCurrentThemeId}
                      playlist={playlist} currentTrackId={currentTrackId} playbackMode={playbackMode} setPlaybackMode={setPlaybackMode} onPlaylistUpload={handlePlaylistUpload} onTrackSelect={handleTrackSelect} onTrackDelete={handleTrackDelete}
                      prizes={prizes} setPrizes={setPrizes} currentPrizeId={currentPrizeId} setCurrentPrizeId={setCurrentPrizeId}
                    />
                  </div>
                  <div className={`text-xs text-center mt-4 ${isDarkTheme ? 'text-white/30' : 'text-slate-400'}`}>© 2026 Lucky Wheel by 中二</div>
                </div>
              </aside>
              {winner && !isSpinning && (<WinnerModal winner={winner} prizeName={currentPrizeId ? prizes.find(p => p.id === currentPrizeId)?.name : ''} onClose={() => setWinner(null)} />)}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
