<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幸運輪盤</title>
    <!-- 使用 Tailwind CDN (單檔模式下為了保持樣式，保留 CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans TC', sans-serif;
      }
      /* 骰子滾動彈跳動畫 - 優化版 */
      @keyframes float-roll {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        20% { transform: translateY(-4px) rotate(-20deg); } /* 上拋並向左傾斜 */
        40% { transform: translateY(1px) rotate(5deg); }   /* 落下接觸並微向右傾 */
        60% { transform: translateY(-2px) rotate(-10deg); } /* 輕微反彈 */
        80% { transform: translateY(0) rotate(2deg); }    /* 歸位前的微調 */
      }
      .animate-float-roll {
        animation: float-roll 2.5s ease-in-out infinite;
      }

      /* 文字流光特效 */
      @keyframes text-shimmer {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-text-shimmer {
        background-size: 200% auto;
        animation: text-shimmer 3s linear infinite;
      }

      /* 緩慢漂浮 */
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      .animate-float-slow {
        animation: float-slow 6s ease-in-out infinite;
      }
      
      @keyframes float-delayed {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      .animate-float-delayed {
        animation: float-delayed 7s ease-in-out infinite;
        animation-delay: 1s;
      }

      /* 星星閃爍特效 */
      @keyframes twinkle {
        0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
        50% { opacity: 0.3; transform: scale(0.5) rotate(45deg); }
      }
      .animate-twinkle {
        animation: twinkle 1.5s ease-in-out infinite;
      }
    </style>
